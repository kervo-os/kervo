<svg xmlns="http://www.w3.org/2000/svg" width="740" height="250" viewBox="0 0 740 250" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"><text x="20" y="30" font-size="13.5" font-weight="600" fill="#1F2328">Does trust labeling survive poisoned context? — H4, pre-registered</text><text x="20" y="48" font-size="11" fill="#57606A">composite accuracy (S1+S2+S3) · n = 24 responses · sonnet + haiku consumers · judges blind to arm and hypothesis</text><text x="20" y="86.0" font-size="12" font-weight="700" fill="#1F2328">A — kervo artifact</text><rect x="208" y="72" width="492" height="20" rx="4" fill="#EFF1F3"/><path d="M208,72 h447.164 a4,4 0 0 1 4,4 v12 a4,4 0 0 1 -4,4 h-447.164 z" fill="#0F7B89"/><text x="667.164" y="86.0" font-size="12" font-weight="700" fill="#1F2328">91.7%</text><text x="20" y="130.0" font-size="12" font-weight="400" fill="#1F2328">B — labels stripped</text><rect x="208" y="116" width="492" height="20" rx="4" fill="#EFF1F3"/><path d="M208,116 h447.164 a4,4 0 0 1 4,4 v12 a4,4 0 0 1 -4,4 h-447.164 z" fill="#0F7B89" fill-opacity="0.42"/><text x="667.164" y="130.0" font-size="12" font-weight="700" fill="#1F2328">91.7%</text><text x="20" y="174.0" font-size="12" font-weight="400" fill="#1F2328">C — unmanaged notes</text><rect x="208" y="160" width="492" height="20" rx="4" fill="#EFF1F3"/><path d="M208,160 h303.5 a4,4 0 0 1 4,4 v12 a4,4 0 0 1 -4,4 h-303.5 z" fill="#C9CFD2"/><text x="523.5" y="174.0" font-size="12" font-weight="700" fill="#1F2328">62.5%</text><text x="20" y="218" font-size="10.5" fill="#57606A">A−C = +29.2pp (pre-registered bar: ≥ 20pp) · arm A lost zero points to poisoned claims across all 54 responses</text><circle cx="24" cy="233" r="3.5" fill="#C4432B"/><text x="33" y="237" font-size="10.5" fill="#57606A">all 3 actual poisoning infections in the program occurred in arm C (weaker consumer model)</text></svg>