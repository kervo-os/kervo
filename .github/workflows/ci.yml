# Release gate (ARCH-0001 §10.4): the byte-identity golden test and the
# core-purity arch-check run on every push — design principles as checks.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA: a hijacked upstream tag must not
      # execute in our CI (tj-actions-style supply chain).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (includes skeleton byte-identity golden; -race for the web servers)
        run: go test -race ./...
      - name: arch-check (core must not import adapters)
        run: make arch-check
